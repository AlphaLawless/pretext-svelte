<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">
  <title>Præ­textus</title>

  <!-- Parchment disc -->
  <circle cx="16" cy="16" r="15.5" fill="#e4d09a"/>

  <!-- Outer border ring -->
  <circle cx="16" cy="16" r="15.5" fill="none" stroke="#2c1810" stroke-width="1.2"/>

  <!-- Inner decorative ring (sits between the arrow waists and centre) -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="#7a5c14" stroke-width="0.7"/>

  <!--
    Cardinal arrowheads — classic compass-rose diamond shape.
    Each path: tip → right shoulder → inner notch → left shoulder → back.
    The shoulder sits just outside the inner ring (r≈9); the notch sits
    just inside it (r≈5), giving the characteristic waisted look.
  -->

  <!-- North -->
  <path d="M16,1.5 L18,9 L16,12.5 L14,9 Z" fill="#2c1810"/>
  <!-- South -->
  <path d="M16,30.5 L18,23 L16,19.5 L14,23 Z" fill="#2c1810"/>
  <!-- East -->
  <path d="M30.5,16 L23,18 L19.5,16 L23,14 Z" fill="#2c1810"/>
  <!-- West -->
  <path d="M1.5,16 L9,18 L12.5,16 L9,14 Z" fill="#2c1810"/>

  <!--
    Diagonal secondary points — half the length, inset so their tips
    reach just inside the outer ring. They add the full 8-point rose
    look without competing with the cardinal arrows at small sizes.
  -->
  <path d="M23.8,8.2 L21,12.5 L19.5,11 L23.5,7 Z" fill="#7a5c14"/>
  <path d="M8.2,8.2  L12.5,11 L11,12.5 L7,8.2 Z"  fill="#7a5c14"/>
  <path d="M23.8,23.8 L19.5,21 L21,19.5 L25,24 Z"  fill="#7a5c14"/>
  <path d="M8.2,23.8  L11,19.5 L12.5,21 L7,25 Z"   fill="#7a5c14"/>

  <!-- Centre hub: filled dot with a small parchment highlight -->
  <circle cx="16" cy="16" r="2.8" fill="#2c1810"/>
  <circle cx="16" cy="16" r="1.1" fill="#e4d09a"/>
</svg>
